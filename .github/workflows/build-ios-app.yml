name: Build iOS .app (debug) and pack to .ipa

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios-debug:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Установка Flutter вручную (надёжнее всего)
      - name: 🔧 Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      # Проверка установки
      - name: 🔍 Verify Flutter
        run: flutter doctor -v

      # Установка зависимостей Dart
      - name: 📦 Install Flutter dependencies
        run: flutter pub get

      # Предварительная загрузка iOS-артефактов (обязательно!)
      - name: 📲 Precache iOS artifacts
        run: flutter precache --ios

      # Установка CocoaPods зависимостей (теперь Flutter.xcframework будет на месте)
      - name: 📦 Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # Сборка debug-версии .app (не требует подписи)
      - name: 🏗 Build debug .app
        run: flutter build ios --debug --no-codesign

      # Упаковка в .ipa (структура Payload/Runner.app)
      - name: 📦 Package to .ipa
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app-debug.ipa Payload

      # Загрузка артефакта
      - name: ☁️ Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.ipa
          path: app-debug.ipa