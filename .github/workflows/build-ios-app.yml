name: Build unsigned .ipa for LiveContainer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Установка Flutter
      - name: 🔧 Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: 📦 Get dependencies
        run: flutter pub get

      # Ручная установка CocoaPods (на всякий случай)
      - name: 📲 Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # Критический шаг: полностью отключаем подпись в проекте Xcode
      - name: 🔧 Disable code signing in Xcode project
        run: |
          PROJECT_FILE="ios/Runner.xcodeproj/project.pbxproj"
          # Удаляем все строки с DEVELOPMENT_TEAM
          sed -i '' '/DEVELOPMENT_TEAM = /d' "$PROJECT_FILE"
          # Удаляем все строки с PROVISIONING_PROFILE
          sed -i '' '/PROVISIONING_PROFILE_SPECIFIER = /d' "$PROJECT_FILE"
          # Удаляем все строки с CODE_SIGN_IDENTITY (оставляем пустые, но лучше удалить)
          sed -i '' '/CODE_SIGN_IDENTITY = /d' "$PROJECT_FILE"
          # Для надёжности также удаляем ссылки на ProvisioningStyle
          sed -i '' '/ProvisioningStyle = /d' "$PROJECT_FILE"
          echo "✅ Code signing requirements removed from Xcode project"

      # Сборка .app без подписи (теперь Xcode не будет требовать)
      - name: 🏗 Build unsigned .app
        run: flutter build ios --release --no-codesign

      # Упаковка в .ipa
      - name: 📦 Package .ipa
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app-unsigned.ipa Payload

      # Загрузка артефакта
      - name: ☁️ Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned.ipa
          path: app-unsigned.ipa