name: Build iOS .app (unsigned) – максимально надёжно

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios-app:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Ручная установка Flutter (не зависит от внешних API)
      - name: 🔧 Install Flutter manually
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: 🔍 Verify Flutter installation
        run: flutter doctor -v

      - name: 📦 Install Flutter dependencies
        run: flutter pub get

      # Генерация необходимых конфигурационных файлов (особенно Generated.xcconfig)
      - name: 📲 Generate iOS config files
        run: flutter build ios --no-codesign --config-only

      # Установка CocoaPods зависимостей
      - name: 📲 Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # Используем development-подпись с автоматически созданным сертификатом раннера
      - name: 🏗 Build signed development .app (for device)
        run: |
          # Устанавливаем DEVELOPMENT_TEAM = "Automatic" через аргументы сборки
          flutter build ios --release --export-method development

      # Проверка, что .app создан
      - name: ✅ Verify .app exists
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "✅ .app built successfully"
          else
            echo "❌ .app not found!"
            exit 1
          fi

      # Упаковка в .ipa (теперь он уже должен быть создан, но на всякий случай)
      - name: 📦 Package .app into .ipa
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload
          echo "✅ .ipa created: app.ipa"

      # Загрузка артефакта
      - name: ☁️ Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa-development
          path: app.ipa