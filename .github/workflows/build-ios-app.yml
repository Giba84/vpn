name: Build iOS .app (unsigned) – максимально надёжно

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # позволяет запускать вручную

jobs:
  build-ios-app:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'

      - name: 📦 Install Flutter dependencies
        run: flutter pub get

      - name: 🧹 Clean any previous builds
        run: flutter clean

      # Универсальная настройка Xcode проекта для сборки без подписи
      - name: 🛠 Configure Xcode project for unsigned build
        run: |
          PROJECT_FILE="ios/Runner.xcodeproj/project.pbxproj"
          if [ ! -f "$PROJECT_FILE" ]; then
            echo "❌ Xcode project file not found!"
            exit 1
          fi
          
          # Делаем резервную копию на всякий случай
          cp "$PROJECT_FILE" "$PROJECT_FILE.backup"
          
          # Устанавливаем DEVELOPMENT_TEAM в фиктивный ID (любой 10-символьный)
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = ABCDEF1234;/g' "$PROJECT_FILE"
          
          # Отключаем CODE_SIGN_IDENTITY
          sed -i '' 's/CODE_SIGN_IDENTITY = "[^"]*"/CODE_SIGN_IDENTITY = ""/g' "$PROJECT_FILE"
          
          # Отключаем PROVISIONING_PROFILE_SPECIFIER
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = "";/g' "$PROJECT_FILE"
          
          # Также отключаем любые упоминания provisioning profiles в других местах
          sed -i '' 's/PROVISIONING_PROFILE = "[^"]*"/PROVISIONING_PROFILE = ""/g' "$PROJECT_FILE"
          
          echo "✅ Xcode project configured for unsigned build"

      # Принудительная установка Pods (иногда требуется для корректной сборки)
      - name: 📲 Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: 🏗 Build unsigned .app
        run: |
          # Явно указываем target устройство (iOS) и отключаем codesign
          flutter build ios --release --no-codesign
          
      # Проверка, что .app создан
      - name: ✅ Verify .app exists
        run: |
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            echo "✅ .app built successfully"
          else
            echo "❌ .app not found!"
            exit 1
          fi

      # Упаковка в .ipa
      - name: 📦 Package .app into .ipa
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload
          echo "✅ .ipa created: app.ipa"

      # Загрузка артефакта
      - name: ☁️ Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa-unsigned
          path: app.ipa

      # (Опционально) Загружаем также .app на случай, если нужен
      - name: ☁️ Upload .app artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle-unsigned
          path: build/ios/iphoneos/Runner.app