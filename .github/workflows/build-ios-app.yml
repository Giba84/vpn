name: Build iOS .ipa (development signing)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios-app:
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Ручная установка Flutter (надёжно)
      - name: 🔧 Install Flutter manually
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: 🔍 Verify Flutter installation
        run: flutter doctor -v

      - name: 📦 Install Flutter dependencies
        run: flutter pub get

      # Генерация конфигов (нужно для pod install)
      - name: 📲 Generate iOS config files
        run: flutter build ios --no-codesign --config-only

      # Установка CocoaPods зависимостей
      - name: 📲 Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      # Сборка .ipa с development-подписью (использует встроенные сертификаты раннера)
      - name: 🏗 Build .ipa (development signing)
        run: flutter build ipa --export-method development

      # Проверка, что .ipa создан
      - name: ✅ Verify .ipa exists
        run: |
          if [ -f "build/ios/ipa/*.ipa" ]; then
            echo "✅ .ipa built successfully"
          else
            echo "❌ .ipa not found!"
            exit 1
          fi

      # Загрузка артефакта
      - name: ☁️ Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa-development
          path: build/ios/ipa/*.ipa