name: Build iOS .app (unsigned)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios-app:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # Дополнительный шаг: настраиваем проект на фиктивную команду и отключаем подпись
      - name: Configure Xcode project for unsigned build
        run: |
          # Устанавливаем DEVELOPMENT_TEAM = "ABCDEF1234" (фиктивный ID)
          /usr/libexec/PlistBuddy -c "Set :objects:BCDEFGHIJK:buildSettings:DEVELOPMENT_TEAM ABCDEF1234" ios/Runner.xcodeproj/project.pbxproj
          # Отключаем требование подписи (CODE_SIGN_IDENTITY = "")
          /usr/libexec/PlistBuddy -c "Set :objects:BCDEFGHIJK:buildSettings:CODE_SIGN_IDENTITY \"\"" ios/Runner.xcodeproj/project.pbxproj
          # Отключаем PROVISIONING_PROFILE_SPECIFIER
          /usr/libexec/PlistBuddy -c "Set :objects:BCDEFGHIJK:buildSettings:PROVISIONING_PROFILE_SPECIFIER \"\"" ios/Runner.xcodeproj/project.pbxproj

      - name: Build unsigned .app
        run: flutter build ios --no-codesign --release

      - name: Create Payload and zip
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r app.ipa Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-ipa-unsigned
          path: app.ipa